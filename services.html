<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- EXTERNAL CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">
    <img src="IMAGES/YH.JPG" alt="Retro Links Logo">
    <h3>Retro Links</h3>
</div>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>

    <a class="whatsapp-btn" href="https://wa.me/26772803135" target="_blank">
        Chat on WhatsApp
    </a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Our Printing Portfolio</h1>
    <p>SERVICES WHICH WE OFFER</p>
</section>

<!-- SERVICES -->
<section class="services">
<h2>Our Work Samples</h2>

<div class="service-buttons">
    <button class="active" onclick="loadGallery('graphic', event)">GRAPHIC DESIGNS</button>
    <button onclick="loadGallery('tshirt', event)">T-SHIRT PRINTING</button>
    <button onclick="loadGallery('stickers', event)">STICKERS & TICKETS</button>
    <button onclick="loadGallery('branding', event)">BRANDING</button>
</div>

<div class="gallery" id="gallery"></div>
</section>

<!-- MODAL -->
<div id="preview-modal">
    <span onclick="closeModal()">&times;</span>
    <img id="modal-img" src="">
</div>

<footer>
<p>© 2026 Retro Links Digital Printing | All Rights Reserved</p>
</footer>

<script>
const categories = {
    graphic: 12,
    tshirt: 30,
    stickers: 20,
    branding: 30
};

const gallery = document.getElementById("gallery");
const modal = document.getElementById("preview-modal");
const modalImg = document.getElementById("modal-img");

function loadGallery(category, event){
    document.querySelectorAll('.service-buttons button').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    gallery.innerHTML = '';

    for(let i=1; i<=categories[category]; i++){
        const img = document.createElement('img');
        img.src = `IMAGES/services/${category}/${i}.jpg`;
        img.onclick = () => openModal(img.src);
        gallery.appendChild(img);
    }
}

function openModal(src){
    modal.style.display = 'flex';
    modalImg.src = src;
}

function closeModal(){
    modal.style.display = 'none';
}

window.onload = () => {
    loadGallery('graphic', {target: document.querySelector('.service-buttons button')});
};
</script>

</body>
</html>
